<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hope Beyond Disability - Empowering caregivers of children living with disabilities.">
    <title>Hope Beyond Disability</title>
    <!-- Google Fonts: Outfit and Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar -->
    <header class="navbar">
        <div class="nav-container">
            <a href="#" class="logo-link">
                <img src="assets/hbd_logo.png" alt="Hope Beyond Disability Logo" class="logo">
            </a>
            <nav class="nav-links">
                <a href="#home">Home</a>
                <a href="#about">About Us</a>
                <a href="#programs">Programs</a>
                <a href="#partnerships">Partnerships</a>
                <a href="#donate">Donate</a>
                <a href="#contact">Contact</a>
            </nav>
            <div class="mobile-menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero" id="home">
        <!-- Background Overlay -->
        <div class="hero-overlay"></div>
        
        <div class="hero-content">
            <h1 class="hero-title">Every child deserves dignity, inclusion, love, and the opportunity to flourish.</h1>
            <p class="hero-subtitle">Hope Beyond Disability exists to challenge stigma, eliminate exclusion, and empower caregivers of children living with disabilities.</p>
            <div class="hero-cta-group">
                <a href="#partnerships" class="btn btn-ghost">Partner With Us</a>
                <a href="#donate" class="btn btn-solid">Support Our Work</a>
            </div>
        </div>
    </section>

    <!-- Script for interactive elements (optional) -->
    <script>
        // Simple sticky navbar effect
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
